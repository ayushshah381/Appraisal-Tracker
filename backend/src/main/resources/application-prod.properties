# Server configuration for production (using dynamic port provided by host environment)
server.port=${PORT:8080}

# Production PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate production settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Copilot API settings (use environment variables for security)
copilot.api.key=${COPILOT_API_KEY:}
copilot.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
