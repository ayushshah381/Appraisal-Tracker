# Server configuration
server.port=8080

# Default configuration (H2 In-Memory Database for ease of testing)
spring.datasource.url=jdbc:h2:mem:appraisaldb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Copilot API settings
# Create a free API key at https://aistudio.google.com/ and set COPILOT_API_KEY env var.
copilot.api.key=${COPILOT_API_KEY:}
copilot.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
